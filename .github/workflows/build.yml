name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential valgrind

    - name: Build (Best-Fit)
      run: make STRATEGY=BEST_FIT release

    - name: Build (First-Fit)
      run: make STRATEGY=FIRST_FIT release

    - name: Run Tests
      run: make test

    - name: Memory Check
      run: make memcheck || true

    - name: Code Analysis
      run: make analyze || true

    - name: Build Docker Image
      run: docker build -t custom-allocator:latest .

  code-quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Format Check
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
        find src include -name "*.c" -o -name "*.h" | xargs clang-format --dry-run -Werror

  security:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: SAST Scan
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck
        cppcheck --enable=all src include --error-exitcode=1 --suppress=missingIncludeSystem
